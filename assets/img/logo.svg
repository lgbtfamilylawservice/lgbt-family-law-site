<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="The LGBT Family Law Service">
  <title>The LGBT Family Law Service</title>
  <desc>Rainbow gavel logo with the wordmark LGBT Family Law Service</desc>

  <defs>
    <!-- Vertical rainbow for the gavel itself: red/pink top fading down through warm to cool -->
    <linearGradient id="gavelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff1f4f"/>
      <stop offset="25%"  stop-color="#ff3f6c"/>
      <stop offset="55%"  stop-color="#e0286a"/>
      <stop offset="85%"  stop-color="#c61f5e"/>
      <stop offset="100%" stop-color="#ff8d3a"/>
    </linearGradient>

    <!-- Rainbow gradients for orbital bands -->
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%"   stop-color="#3e7bff"/>
      <stop offset="20%"  stop-color="#3aa6ff"/>
      <stop offset="45%"  stop-color="#3ad17a"/>
      <stop offset="65%"  stop-color="#ffd83a"/>
      <stop offset="85%"  stop-color="#ff7a3a"/>
      <stop offset="100%" stop-color="#ff2a6d"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%"   stop-color="#7f3aff"/>
      <stop offset="25%"  stop-color="#ff2a6d"/>
      <stop offset="55%"  stop-color="#ff8d3a"/>
      <stop offset="80%"  stop-color="#ffd83a"/>
      <stop offset="100%" stop-color="#3ad17a"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#9a3aff"/>
      <stop offset="35%"  stop-color="#3e7bff"/>
      <stop offset="65%"  stop-color="#3ad17a"/>
      <stop offset="100%" stop-color="#ffd83a"/>
    </linearGradient>

    <!-- Soft shadow for the gavel -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" in="SourceAlpha"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============ Mark (rainbow gavel + orbital) ============ -->
  <g transform="translate(20,18)">

    <!-- Orbital rainbow rings, slightly tilted, sitting behind the gavel -->
    <g transform="rotate(-22 90 100)" filter="url(#softShadow)">
      <ellipse cx="90" cy="100" rx="80" ry="28" fill="none" stroke="url(#ring1)" stroke-width="8" stroke-linecap="round"/>
      <ellipse cx="90" cy="100" rx="68" ry="22" fill="none" stroke="url(#ring2)" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
      <ellipse cx="90" cy="100" rx="56" ry="17" fill="none" stroke="url(#ring3)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- Gavel (rotated -28deg). Drawn so handle passes through the ring -->
    <g transform="rotate(-28 90 95)">
      <!-- handle -->
      <rect x="82" y="55" width="16" height="120" rx="7" fill="url(#gavelGrad)"/>
      <!-- head -->
      <rect x="50" y="20" width="80" height="42" rx="8" fill="url(#gavelGrad)"/>
      <!-- subtle highlight on head -->
      <rect x="56" y="25" width="68" height="6" rx="3" fill="#fff" opacity="0.18"/>
    </g>

  </g>

  <!-- ============ Wordmark ============ -->
  <g font-family="'Iowan Old Style','Palatino Linotype','Palatino','Book Antiqua',Georgia,serif" fill="#2a2940">

    <!-- Top line -->
    <text x="220" y="92" font-size="56" font-weight="700" letter-spacing="3">LGBT FAMILY</text>

    <!-- Bottom line -->
    <text x="262" y="148" font-size="36" font-weight="700" letter-spacing="14">LAW SERVICE</text>
  </g>
</svg>
